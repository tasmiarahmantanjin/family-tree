apiVersion: apps/v1
kind: Deployment
metadata:
  name: family-tree
spec:
  replicas: 1
  selector:
    matchLabels:
      app: family-tree
  template:
    metadata:
      labels:
        app: family-tree
    spec:
      containers:
        - name: family-tree
          image: rahmantz/family-tree-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_SSL
              value: "true"
            - name: FRONTEND_URL
              value: "https://app.trlab.dev,https://family-tree-eight-ashen.vercel.app"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: family-tree-secrets
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
