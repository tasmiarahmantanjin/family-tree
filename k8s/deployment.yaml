apiVersion: apps/v1
kind: Deployment
metadata:
  name: family-tree
spec:
  replicas: 1
  selector:
    matchLabels:
      app: family-tree
  template:
    metadata:
      labels:
        app: family-tree
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: family-tree
          image: rahmantz/family-tree-backend:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_SSL
              value: "true"
            - name: FRONTEND_URL
              value: "https://app.trlab.dev,https://family-tree-eight-ashen.vercel.app"
            - name: APP_URL
              value: "https://app.trlab.dev"
            - name: JWT_ACCESS_EXPIRY
              value: "15m"
            - name: JWT_REFRESH_EXPIRY
              value: "7d"
            - name: GOOGLE_OAUTH_REDIRECT_URI
              value: "https://api.trlab.dev/api/v1/auth/google/callback"
            - name: COOKIE_DOMAIN
              value: ".trlab.dev"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: family-tree-secrets
                  key: DATABASE_URL
            # Auth secrets — create once via:
            #   kubectl create secret generic family-tree-auth-secrets \
            #     --from-literal=JWT_ACCESS_SECRET=$(openssl rand -hex 48) \
            #     --from-literal=OAUTH_STATE_SECRET=$(openssl rand -hex 24) \
            #     --from-literal=GOOGLE_OAUTH_CLIENT_ID=... \
            #     --from-literal=GOOGLE_OAUTH_CLIENT_SECRET=...
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: family-tree-auth-secrets
                  key: JWT_ACCESS_SECRET
            - name: OAUTH_STATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: family-tree-auth-secrets
                  key: OAUTH_STATE_SECRET
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: family-tree-auth-secrets
                  key: GOOGLE_OAUTH_CLIENT_ID
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: family-tree-auth-secrets
                  key: GOOGLE_OAUTH_CLIENT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
