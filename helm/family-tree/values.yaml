replicaCount: 1

image:
  repository: rahmantz/family-tree-backend
  tag: "e40d4162e6d6c04b79df9e30fa7db6609a680233"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3001

ingress:
  enabled: true
  className: traefik
  host: api.trlab.dev
  tls:
    enabled: true
    secretName: family-tree-tls
    clusterIssuer: letsencrypt-prod

env:
  NODE_ENV: production
  PORT: "3001"
  DATABASE_SSL: "true"
  FRONTEND_URL: "https://app.trlab.dev,https://family-tree-eight-ashen.vercel.app"
  APP_URL: "https://app.trlab.dev"
  JWT_ACCESS_EXPIRY: "15m"
  JWT_REFRESH_EXPIRY: "7d"
  GOOGLE_OAUTH_REDIRECT_URI: "https://api.trlab.dev/api/v1/auth/google/callback"
  COOKIE_DOMAIN: ".trlab.dev"

secrets:
  existingSecret: family-tree-secrets
  databaseUrlKey: DATABASE_URL
  # Each key below references a key within the `authSecret` Kubernetes Secret
  # and maps it to an env var on the pod. Create the secret out-of-band:
  #   kubectl create secret generic family-tree-auth-secrets \
  #     --from-literal=JWT_ACCESS_SECRET=$(openssl rand -hex 48) \
  #     --from-literal=OAUTH_STATE_SECRET=$(openssl rand -hex 24) \
  #     --from-literal=GOOGLE_OAUTH_CLIENT_ID=... \
  #     --from-literal=GOOGLE_OAUTH_CLIENT_SECRET=...
  authSecret:
    existingSecret: family-tree-auth-secrets
    keys:
      - JWT_ACCESS_SECRET
      - OAUTH_STATE_SECRET
      - GOOGLE_OAUTH_CLIENT_ID
      - GOOGLE_OAUTH_CLIENT_SECRET

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

healthcheck:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10
