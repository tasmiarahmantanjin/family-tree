name: E2E Tests

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Start services
        run: |
          docker compose -f docker-compose.e2e.yml up -d --build
          echo "Waiting for backend..."
          for attempt in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://localhost:3001/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready"
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Backend never became ready. Container logs:"
              docker compose -f docker-compose.e2e.yml logs backend
              exit 1
            fi
            echo "Attempt $attempt: backend not ready ($STATUS), waiting..."
            sleep 5
          done
          echo "Waiting for frontend..."
          for attempt in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://localhost:3000 || true)
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is ready"
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "Frontend never became ready. Container logs:"
              docker compose -f docker-compose.e2e.yml logs frontend
              exit 1
            fi
            echo "Attempt $attempt: frontend not ready ($STATUS), waiting..."
            sleep 5
          done

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
